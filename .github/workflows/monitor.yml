name: Polymarket Monitor

on:
  # ── Scheduled polling every 5 minutes ──────────────────────────────────────
  # GitHub Actions cron minimum is every 5 minutes.
  # Note: under heavy load GitHub may delay runs by 1–5 min.
  schedule:
    - cron: "*/15 * * * *"

  # ── Manual trigger (for testing / one-off runs) ────────────────────────────
  workflow_dispatch:
    inputs:
      send_startup:
        description: "Send Telegram startup message?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

  # ── Auto-run on push to main (good for first-deploy testing) ──────────────
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "run.py"
      - "wallets.json"

# Prevent two runs overlapping (state file could conflict)
concurrency:
  group: monitor-run
  cancel-in-progress: false   # queue, don't cancel

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8        # kill if hung (cron fires every 5 min)

    permissions:
      contents: write          # needed to commit state.json back

    steps:
      # ── 1. Checkout full history (needed to commit state back) ──────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run the monitor ──────────────────────────────────────────────────
      - name: Run monitor
        env:
          # ── Required secrets (set these in repo Settings → Secrets) ─────────
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
          # ── Optional tuning ──────────────────────────────────────────────────
          MY_COPY_SIZE_USDC:   ${{ vars.MY_COPY_SIZE_USDC || '50' }}
          MAX_COPY_LOSS_PCT:   ${{ vars.MAX_COPY_LOSS_PCT || '80' }}
          # ── Startup flag ─────────────────────────────────────────────────────
          SEND_STARTUP: ${{ github.event.inputs.send_startup || 'false' }}
        run: |
          if [ "$SEND_STARTUP" = "true" ]; then
            python run.py --startup
          else
            python run.py
          fi

      # ── 5. Commit state.json back to repo ───────────────────────────────────
      # This is how state persists between stateless GitHub Actions runs.
      - name: Commit state
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/copy_portfolio.json || true
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
